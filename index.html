<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truchet Tile Variations ГўВЂВ” Studio Luminant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8A6E2F;
    --obsidian: #0C0C0E;
    --deep: #111114;
    --surface: #18181D;
    --surface-2: #1F1F26;
    --border: rgba(201,168,76,0.18);
    --text-primary: #F0EAD6;
    --text-secondary: #9A9088;
    --text-muted: #8A8078;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: var(--obsidian);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem;
  }
  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  body > * { position: relative; z-index: 1; }

  .eyebrow {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.8rem;
  }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--gold); }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
    color: var(--text-primary);
  }
  .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  /* Pattern buttons */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    margin-bottom: 1.8rem;
  }
  button {
    font-family: 'Jost', sans-serif;
    padding: 0.5rem 1.1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 0;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  button.active {
    background: var(--gold); color: var(--obsidian);
    border-color: var(--gold); font-weight: 500;
  }

  /* Tile selector row */
  .tile-select-wrap {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .tile-select-wrap > label:first-of-type {
    font-size: 0.65rem;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #tileLibrary {
    font-family: 'Jost', sans-serif;
    padding: 0.45rem 0.7rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 0.82rem;
    font-weight: 300;
    letter-spacing: 0.03em;
    border-radius: 0;
    cursor: pointer;
    min-width: 200px;
    transition: border-color 0.3s;
  }
  #tileLibrary:hover, #tileLibrary:focus { border-color: var(--gold); outline: none; }
  #tileLibrary optgroup { font-weight: 500; color: var(--text-primary); }
  #tileLibrary option { font-weight: 300; background: var(--surface); color: var(--text-primary); }
  #uploadLabel {
    font-family: 'Jost', sans-serif !important;
    padding: 0.45rem 0.9rem !important;
    border: 1px solid var(--border) !important;
    background: var(--surface) !important;
    color: var(--text-secondary) !important;
    font-size: 0.78rem !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    cursor: pointer !important;
    border-radius: 0 !important;
    transition: all 0.3s ease !important;
  }
  #uploadLabel:hover { border-color: var(--gold) !important; color: var(--gold) !important; }

  /* Color controls */
  .color-controls {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    margin-bottom: 1.8rem;
    font-size: 0.78rem;
    flex-wrap: wrap;
    justify-content: center;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .color-controls label { display: flex; align-items: center; gap: 0.5rem; }
  .color-controls input[type="color"] {
    width: 28px; height: 28px; border: 1px solid var(--border); cursor: pointer;
    padding: 0; background: var(--surface); border-radius: 0;
  }
  .color-controls input[type="range"] {
    accent-color: var(--gold);
  }

  /* Grid container */
  .grid-container {
    background: var(--surface);
    padding: 1.5rem;
    border: 1px solid var(--border);
    box-shadow: 0 4px 40px rgba(0,0,0,0.3);
    display: inline-block;
    line-height: 0;
  }
  svg#tiling {
    display: block;
    max-width: 90vw;
    max-height: 72vh;
  }

  /* Tile preview thumbs */
  .tile-preview {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }
  .tile-preview-label {
    font-size: 0.65rem;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .tile-thumb {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 0;
    cursor: pointer;
    background: var(--surface-2);
    padding: 4px;
    transition: all 0.3s ease;
    position: relative;
  }
  .tile-thumb:hover { border-color: var(--gold); }
  .tile-thumb.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  .tile-thumb svg { width: 100%; height: 100%; display: block; }
  .tile-thumb-deg {
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .info {
    margin-top: 1.2rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* SL branding footer */
  .sl-brand {
    margin-top: 2.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.5;
  }
  .sl-brand span { color: var(--gold); }

  @media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
    .controls { gap: 0.3rem; }
    button { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
    .tile-select-wrap { flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>

    svg: `<rect width="100" height="100" fill="white"/><path d="M 42,0 L 42,42 L 100,42 L 100,58 L 58,58 L 58,0 Z" fill="black"/><path d="M 0,42 L 17,42 L 17,100 L 33,100 L 33,58 L 0,58 Z" fill="black"/>`
  }
};

function loadTile(key) {
  const tile = TILE_LIBRARY[key];
  if (!tile) return;
  tileViewBox = tile.vb;
  tileInnerSVG = tile.svg;
  document.querySelector('h1').textContent = `Truchet Tile ГўВЂВ” ${key}`;
  render();
  renderThumbs();
}

// Pattern generators ГўВЂВ” each returns a 12x12 array of rotations (0, 1, 2, 3 = 0Г‚В°, 90Г‚В°, 180Г‚В°, 270Г‚В°)
const patterns = {
  random: () => Array.from({length: GRID}, () => Array.from({length: GRID}, () => Math.floor(Math.random() * 4))),

  diagonal: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => (r + c) % 4)),

  diamond: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => {
    const dr = Math.abs(r - 5.5), dc = Math.abs(c - 5.5);
    return Math.floor(dr + dc) % 4;
  })),

  spiral: () => {
    const grid = Array.from({length: GRID}, () => Array(GRID).fill(0));
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        const angle = Math.atan2(r - 5.5, c - 5.5);
        const dist = Math.sqrt((r - 5.5) ** 2 + (c - 5.5) ** 2);
        grid[r][c] = Math.floor((angle / Math.PI * 2 + dist * 0.5 + 4) * 2) % 4;
      }
    }
    return grid;
  },

  checker: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => ((r + c) % 2) * 2)),

  columns: () => Array.from({length: GRID}, () => Array.from({length: GRID}, (_, c) => c % 4)),

  rows: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, () => r % 4)),

  zigzag: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => {
    return r % 2 === 0 ? c % 2 : (c % 2 === 0 ? 2 : 3);
  })),

  pinwheel: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => {
    const qr = r < 6 ? 0 : 1;
    const qc = c < 6 ? 0 : 1;
    return (qr * 2 + qc);
  })),

  maze: () => {
    // Generates a maze-like pattern using alternating orientations
    const grid = Array.from({length: GRID}, () => Array(GRID).fill(0));
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        // Create connected-looking paths
        const hash = Math.sin(r * 127.1 + c * 311.7) * 43758.5453;
        grid[r][c] = (Math.floor(Math.abs(hash)) % 2) * 2 + (r % 2);
      }
    }
    return grid;
  },

  wave: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => {
    const wave = Math.sin(c * 0.8 + r * 0.3) * 2;
    return ((Math.floor(wave) % 4) + 4) % 4;
  })),

  radial: () => Array.from({length: GRID}, (_, r) => Array.from({length: GRID}, (_, c) => {
    const angle = Math.atan2(r - 5.5, c - 5.5);
    return ((Math.floor(angle / (Math.PI / 2)) % 4) + 4) % 4;
  })),
};

function renderThumbs() {
  // Render all thumbs at 0Г‚В° with clipping, then CSS-rotate the whole element.
  // This ensures the tile is clipped to its boundary first, then rotated as a unit
  // (matching how the grid renders via <symbol overflow="hidden"> + <use transform>).
  for (let i = 0; i < 4; i++) {
    const svg = document.getElementById(`thumb${i}`);
    const angle = i * 90;
    svg.setAttribute('viewBox', tileViewBox);
    svg.style.overflow = 'hidden';
    svg.style.transform = `rotate(${angle}deg)`;
    svg.innerHTML = `<g fill="${fillColor}">${tileInnerSVG}</g>`;
  }
}

function render() {
  const svg = document.getElementById('tiling');
  const totalSize = GRID * TILE_SIZE;
  svg.setAttribute('width', totalSize);
  svg.setAttribute('height', totalSize);
  svg.setAttribute('viewBox', `0 0 ${totalSize} ${totalSize}`);

  // Use a <symbol> with the original viewBox ГўВЂВ” the browser handles scaling via width/height on <use>
  // Add a clipPath inside the symbol to clip to tile boundary (replacing the original clip-paths)
  let html = `<rect width="${totalSize}" height="${totalSize}" fill="${bgColor}"/>`;
  html += `<defs>
    <symbol id="tile" viewBox="${tileViewBox}" overflow="hidden">
      ${tileInnerSVG}
    </symbol>
  </defs>`;

  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const rot = currentRotations[r][c];
      const x = c * TILE_SIZE;
      const y = r * TILE_SIZE;
      const cx = x + TILE_SIZE / 2;
      const cy = y + TILE_SIZE / 2;
      const angle = rot * 90;
      html += `<use href="#tile" x="${x}" y="${y}" width="${TILE_SIZE}" height="${TILE_SIZE}"
        transform="rotate(${angle} ${cx} ${cy})" fill="${fillColor}" />`;
    }
  }

  svg.innerHTML = html;
}

function setPattern(name) {
  currentPattern = name;
  currentRotations = patterns[name]();
  render();
  renderThumbs();

  document.querySelectorAll('.controls button').forEach(b => {
    b.classList.toggle('active', b.dataset.pattern === name);
  });

  document.getElementById('info').textContent =
    name === 'random' ? 'Click "Random" again to regenerate' : `Pattern: ${name}`;
}

// Event listeners

// Tile thumb click ГўВЂВ” set entire grid to that rotation
document.getElementById('tilePreview').addEventListener('click', e => {
  const thumb = e.target.closest('.tile-thumb');
  if (!thumb) return;
  const rot = parseInt(thumb.dataset.rot);
  currentRotations = Array.from({length: GRID}, () => Array(GRID).fill(rot));
  render();
  // Highlight active thumb
  document.querySelectorAll('.tile-thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
  document.getElementById('info').textContent = `All tiles: ${rot * 90}Г‚В°`;
});

document.getElementById('controls').addEventListener('click', e => {
  if (!e.target.dataset.pattern) return;
  // Clear active thumb when switching patterns
  document.querySelectorAll('.tile-thumb').forEach(t => t.classList.remove('active'));
  setPattern(e.target.dataset.pattern);
});

document.getElementById('fillColor').addEventListener('input', e => {
  fillColor = e.target.value;
  render();
  renderThumbs();
});

document.getElementById('bgColor').addEventListener('input', e => {
  bgColor = e.target.value;
  document.getElementById('gridContainer').style.background = bgColor;
  render();
});

document.getElementById('invertBtn').addEventListener('click', () => {
  const tmp = fillColor;
  fillColor = bgColor;
  bgColor = tmp;
  document.getElementById('fillColor').value = fillColor;
  document.getElementById('bgColor').value = bgColor;
  document.getElementById('gridContainer').style.background = bgColor;
  render();
  renderThumbs();
});

document.getElementById('gridSize').addEventListener('input', e => {
  GRID = parseInt(e.target.value);
  document.getElementById('gridLabel').textContent = `${GRID}ГѓВ—${GRID}`;
  document.getElementById('subtitle').textContent = `${GRID} ГѓВ— ${GRID} Tiling Variations`;
  setPattern(currentPattern);
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const svg = document.getElementById('tiling');
  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(svg);
  source = '<?xml version="1.0" encoding="UTF-8"?>\n' + source;
  const blob = new Blob([source], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const tileName = document.getElementById('tileLibrary').value || 'custom';
  a.download = `truchet_${tileName}_${currentPattern}_${GRID}x${GRID}.svg`;
  a.click();
  URL.revokeObjectURL(url);
});

// Tile library dropdown
document.getElementById('tileLibrary').addEventListener('change', e => {
  const key = e.target.value;
  if (key === 'custom') return;
  loadTile(key);
  setPattern(currentPattern);
});

document.getElementById('svgUpload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) { alert('No valid SVG found'); return; }

    // Extract viewBox or width/height
    let vb = svg.getAttribute('viewBox');
    if (!vb) {
      const w = parseFloat(svg.getAttribute('width')) || 100;
      const h = parseFloat(svg.getAttribute('height')) || 100;
      vb = `0 0 ${w} ${h}`;
    }
    tileViewBox = vb;

    // Extract all child elements as inner SVG (skip defs with color-profiles, keep paths/groups)
    // Clone all children into a temp container
    let inner = '';
    for (const child of svg.children) {
      const tag = child.tagName.toLowerCase();
      if (tag === 'sodipodi:namedview' || tag === 'metadata') continue;
      // Include defs only if they contain clipPaths/gradients (not color-profiles)
      inner += child.outerHTML;
    }
    tileInnerSVG = inner;

    // Update title and dropdown
    const name = file.name.replace('.svg', '');
    document.querySelector('h1').textContent = `Truchet Tile ГўВЂВ” ${name}`;
    document.getElementById('info').textContent = `Custom tile: ${file.name}`;

    // Add/update custom option in dropdown
    const sel = document.getElementById('tileLibrary');
    let customOpt = sel.querySelector('option[value="uploaded"]');
    if (!customOpt) {
      customOpt = document.createElement('option');
      customOpt.value = 'uploaded';
      sel.insertBefore(customOpt, sel.querySelector('optgroup'));
    }
    customOpt.textContent = `ГўВ†В‘ ${name}`;
    sel.value = 'uploaded';

    render();
    renderThumbs();
  };
  reader.readAsText(file);
  // Reset input so same file can be re-uploaded
  e.target.value = '';
});

// Initialize
setPattern('random');
</script>
</body>
</html>
